<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#af1700">
    <title>Breaker Match Scouter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Landing: logo + event links -->
        <div id="view-landing" class="view">
            <header class="header">
                <img src="https://avatars.githubusercontent.com/u/16344144?s=400&u=35ba89f3aa42ec91abac0952a4254a1a914630ab&v=4" alt="Team Logo" class="logo">
                <h1>Breaker Match Scouter</h1>
                <p class="subtitle">Team 5104 — 2026 REBUILT</p>
                <p id="test-mode-banner" class="test-banner" style="display:none;">Test mode: using Half Moon Bay schedule</p>
            </header>
            <main class="main">
                <div id="events-loading" class="loading">Loading events…</div>
                <div id="events-error" class="error" style="display:none;"></div>
                <nav id="events-list" class="events-list" style="display:none;"></nav>
                <p class="landing-footer">
                    <a href="#" id="scouting-form-link" class="link-white">Scouting Google Form</a>
                </p>
            </main>
        </div>

        <!-- Event: match list -->
        <div id="view-event" class="view" style="display:none;">
            <header class="header header-compact">
                <button type="button" class="back-btn" id="event-back" aria-label="Back">← Back</button>
                <h1 id="event-title">Event</h1>
            </header>
            <main class="main">
                <div id="matches-loading" class="loading">Loading matches…</div>
                <div id="matches-error" class="error" style="display:none;"></div>
                <div id="matches-list" class="matches-list" style="display:none;"></div>
            </main>
        </div>

        <!-- Match: scouting report -->
        <div id="view-match" class="view" style="display:none;">
            <header class="header header-compact">
                <button type="button" class="back-btn" id="match-back" aria-label="Back">← Back</button>
                <h1 id="match-title">Match</h1>
            </header>
            <main class="main">
                <div id="report-loading" class="loading">Loading scouting report…</div>
                <div id="report-error" class="error" style="display:none;"></div>
                <article id="report-content" class="report" style="display:none;"></article>
            </main>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        if (typeof CONFIG !== 'undefined' && CONFIG.BREAKERBOTS_CSS) {
            var l = document.createElement('link');
            l.rel = 'stylesheet';
            l.href = 'https://breakerbots.com/assets/main.css';
            var styleLink = document.querySelector('link[href*="style.css"]');
            document.head.insertBefore(l, styleLink || document.head.firstChild);
        }
    </script>
    <script src="js/tba.js"></script>
    <script src="js/statbotics.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
